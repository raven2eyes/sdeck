<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Background -->
  <rect width="200" height="100" fill="#16213e" rx="4"/>

  <!-- Bulb icon -->
  <circle id="bulb_icon" cx="30" cy="30" r="18" fill="#555555"/>
  <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16213e">💡</text>

  <!-- State -->
  <text id="state_label" x="62" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">off</text>

  <!-- Brightness percentage -->
  <text id="brightness_text" x="62" y="40" font-family="Arial, sans-serif" font-size="11" fill="#4ecca3">0%</text>

  <!-- Color temp -->
  <text id="color_temp_text" x="62" y="54" font-family="Arial, sans-serif" font-size="9" fill="#888888"></text>

  <!-- Brightness bar background -->
  <rect x="4" y="68" width="192" height="6" rx="3" fill="#2a2a4a"/>

  <!-- Brightness bar fill -->
  <rect id="brightness_bar" x="4" y="68" width="0" height="6" rx="3" fill="#f0c040"/>

  <!-- Encoder hint -->
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="8" fill="#444444">🔆 ⏻</text>
</svg>
