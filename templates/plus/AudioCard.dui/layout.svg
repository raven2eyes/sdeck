<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Background -->
  <rect width="200" height="100" fill="#16213e" rx="4"/>

  <!-- Album art placeholder -->
  <image id="album_art" x="4" y="4" width="52" height="52" href=""/>

  <!-- Track info -->
  <text id="title" x="62" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">No media</text>
  <text id="artist" x="62" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888"></text>

  <!-- State indicator -->
  <text id="state_label" x="62" y="54" font-family="Arial, sans-serif" font-size="9" fill="#4ecca3">idle</text>

  <!-- Volume bar background -->
  <rect x="4" y="68" width="192" height="6" rx="3" fill="#2a2a4a"/>

  <!-- Volume bar fill -->
  <rect id="volume_bar" x="4" y="68" width="96" height="6" rx="3" fill="#4ecca3"/>

  <!-- Volume label -->
  <text x="4" y="90" font-family="Arial, sans-serif" font-size="9" fill="#666666">VOL</text>

  <!-- Encoder hint -->
  <text x="172" y="90" font-family="Arial, sans-serif" font-size="8" fill="#444444">🔊 ⏯</text>
</svg>
