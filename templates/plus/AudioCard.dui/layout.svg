<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="200" height="100" viewBox="0 0 200 100">
  <!-- Background -->
  <rect width="200" height="100" fill="#16213e" rx="4"/>

  <!-- Cover art placeholder -->
  <rect id="cover_placeholder" x="6" y="6" width="50" height="50" rx="4" fill="#2a2a4a"/>
  <image id="cover" x="6" y="6" width="50" height="50" href=""/>

  <!-- Track info -->
  <text id="title" x="62" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0"></text>
  <text id="artist" x="62" y="36" font-family="Arial, sans-serif" font-size="12" fill="#888888"></text>
  <text id="album" x="62" y="48" font-family="Arial, sans-serif" font-size="9" fill="#666666"></text>

  <!-- State indicator -->
  <text id="state" x="62" y="60" font-family="Arial, sans-serif" font-size="11" fill="#4ecca3">Stopped</text>

  <!-- Spinner (loading indicator) -->
  <g id="spinner" transform="translate(100, 50)" opacity="0">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4ecca3" stroke-width="2.5"
            stroke-dasharray="20 24" stroke-linecap="round"/>
  </g>

  <!-- Volume bar background -->
  <rect x="6" y="70" width="150" height="6" rx="3" fill="#2a2a4a"/>
  <!-- Volume bar fill (width=150 = full range; DeckUI scales by normalised value) -->
  <rect id="volume_bar" x="6" y="70" width="150" height="6" rx="3" fill="#dedede"/>

  <!-- Volume percentage text -->
  <text id="value_text" x="162" y="76" font-family="Arial, sans-serif" font-size="10" fill="#888888">50%</text>

  <!-- Encoder hint -->
  <text x="6" y="92" font-family="Arial, sans-serif" font-size="8" fill="#444444">&#x1F50A; hold ⏯ · press+turn ⏮⏭</text>
</svg>
