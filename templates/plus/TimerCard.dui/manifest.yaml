name: TimerCard
type: TouchStripCard
version: 1
description: A Timer Card to set, start, pause, reset a timer
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  timer:
    type: text
    node: timer
    default: "00:30:00"
    max_width: 190
    overflow: ellipsis

  background:
    type: color
    node: background
    attribute: color
    default: "#1c1c1c"

  foreground:
    type: color
    node: foreground
    attribute: color
    default: "#dedede"

events:
  - name: decrease_duration
    source: encoder_turn
    direction: left
    accumulate: true
    accumulate_delay: 0.01

  - name: decrease_duration_alt
    source: encoder_press_turn
    direction: left
    accumulate: true
    accumulate_delay: 0.01

  - name: increase_duration
    source: encoder_turn
    direction: right
    accumulate: true
    accumulate_delay: 0.01

  - name: increase_duration_alt
    source: encoder_press_turn
    direction: right
    accumulate: true
    accumulate_delay: 0.01   

  - name: toggle
    source: encoder_press_release
    max_duration_ms: 300

  - name: reset
    source: encoder_hold
    hold_ms: 350

regions:
  card:
    x: 0
    y: 0
    width: 197
    height: 98
    events: []
