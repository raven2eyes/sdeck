<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Background -->
  <rect width="200" height="100" fill="#0f3460" rx="4"/>

  <!-- Connected icon (green dot) -->
  <circle id="connected_icon" cx="16" cy="16" r="6" fill="#4ecca3" display="none"/>

  <!-- Disconnected icon (red dot) -->
  <circle id="disconnected_icon" cx="16" cy="16" r="6" fill="#e94560"/>

  <!-- Status label -->
  <text id="status_label" x="30" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">SDeck</text>

  <!-- Time display -->
  <text id="time_display" x="100" y="60" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">--:--</text>

  <!-- Navigation hint -->
  <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#444444">← encoder →</text>

  <!-- Version / profile info area -->
  <text x="170" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333333">v0.1</text>
</svg>
