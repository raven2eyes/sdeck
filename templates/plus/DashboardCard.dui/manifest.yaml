name: DashboardCard
type: TouchStripCard
version: 1
description: Displays date and time, temperature and humidity and brightness control for the Deck
author: Graphras.com
license: Apache-2.0
category: media
layout: layout.svg

bindings:
  date:
    type: text
    node: date
    default: ""
    max_width: 190
    overflow: ellipsis

  time:
    type: text
    node: time
    default: ""
    max_width: 190
    overflow: clip

  temperature:
    type: text
    node: temperature
    default: ""
    max_width: 50
    overflow: clip

  humidity:
    type: text
    node: humidity
    default: ""
    max_width: 50
    overflow: clip

  deck_brightness:
    type: range
    node: deck_brightness
    default: 0.5
    direction: horizontal

events:
  - name: brightness_down
    source: encoder_turn
    direction: left
    accumulate: true
    accumulate_delay: 0.05

  - name: brightness_up
    source: encoder_turn
    direction: right
    accumulate: true
    accumulate_delay: 0.05

  - name: next_screen
    source: encoder_press_release
    max_duration_ms: 250
    
regions:
  card:
    x: 0
    y: 0
    width: 197
    height: 98
    events: []
