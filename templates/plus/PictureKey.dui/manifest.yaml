name: PictureKey
type: Key
version: 1
layout: layout.svg
description: "A key that displays an image with an optional label"
author: raven2eyes
license: MIT
category: utilities
device:
  - stream-deck-plus

bindings:
  icon:
    type: image
    node: icon
    fit: cover
  label:
    type: text
    node: label
    default: ""
    max_width: 110
    overflow: ellipsis

events:
  - name: press
    source: key_press_release
