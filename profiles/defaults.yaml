# Default provisioning profile for Stream Deck +
model: stream-deck-plus

templates:
  keys:
    - slot: 0
      template: PictureKey.dui
    - slot: 1
      template: PictureKey.dui
    - slot: 2
      template: IconKey.dui
    - slot: 3
      template: IconKey.dui
    - slot: 4
      template: PictureKey.dui
    - slot: 5
      template: PictureKey.dui
    - slot: 6
      template: IconKey.dui
    - slot: 7
      template: IconKey.dui

  touchscreen:
    - slot: 0
      template: AudioCard.dui
      controller: audio
      config:
        media_player: entertainment
    - slot: 1
      template: LightCard.dui
      controller: light
      config:
        entity: upstairs
    - slot: 2
      template: TimerCard.dui
      controller: timer
      config:
        entity: streamdeck
    - slot: 3
      template: DashboardCard.dui
      controller: dashboard
      config:
        screens:
          - main

ha:
  url: ${HA_URL}
  token: ${HA_TOKEN}
