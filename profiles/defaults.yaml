# Default provisioning profile for Stream Deck +
model: stream-deck-plus

templates:
  keys:
    - slot: 0
      template: IconKey.dui
      config:
        icon: "mdi:home"
        label: "Home"
    - slot: 1
      template: IconKey.dui
      config:
        icon: "mdi:lightbulb-group"
        label: "All Lights"
    - slot: 2
      template: IconKey.dui
      config:
        icon: "mdi:weather-night"
        label: "Night"
    - slot: 3
      template: IconKey.dui
      config:
        icon: "mdi:power-sleep"
        label: "Goodnight"
    - slot: 4
      template: IconKey.dui
      config:
        icon: "mdi:music"
        label: "Music"
    - slot: 5
      template: IconKey.dui
      config:
        icon: "mdi:lamp"
        label: "Lights"
    - slot: 6
      template: IconKey.dui
      config:
        icon: "mdi:timer-outline"
        label: "Timer"
    - slot: 7
      template: IconKey.dui
      config:
        icon: "mdi:view-dashboard"
        label: "Dash"

  touchscreen:
    - slot: 0
      template: AudioCard.dui
      controller: audio
      config:
        media_player: entertainment
    - slot: 1
      template: LightCard.dui
      controller: light
      config:
        entity: upstairs
    - slot: 2
      template: TimerCard.dui
      controller: timer
      config:
        entity: sdeck_timer
    - slot: 3
      template: DashboardCard.dui
      controller: dashboard
      config:
        screens:
          - main

ha:
  url: ${HA_URL}
  token: ${HA_TOKEN}
