# Living Room Stream Deck + — Lights and Sonos
extends: defaults
serial: CHANGE_ME_LIVING_ROOM
scenes:
  - living-room-music

templates:
  keys:
    - slot: 0
      template: IconKey.dui
      config:
        icon: "mdi:sofa"
        label: "Living Room"
    - slot: 1
      template: IconKey.dui
      config:
        icon: "mdi:lightbulb-group"
        label: "All Lights"
        actions:
          - action: toggle
            domain: light
            entity: living_room
          - action: toggle
            domain: switch
            entity: vitrine
    - slot: 2
      template: IconKey.dui
      config:
        icon: "mdi:ceiling-light"
        label: "Coffeetable"
        action: toggle
        domain: light
        entity: coffetable
    - slot: 3
      template: IconKey.dui
      config:
        icon: "mdi:power-sleep"
        label: "Goodnight"
        actions:
          - action: "off"
            domain: light
            entity: living_room
          - action: turn_off
            domain: switch
            entity: vitrine
          - action: pause
            domain: media_player
            entity: living_room
    - slot: 4
      template: PictureKey.dui
      config:
        icon: "assets/keys/kvf-radio.png"
        label: "Kringvarp"
        action: play_media
        domain: media_player
        entity: living_room
        action_data:
          media_content_type: "favorite_item_id"
          media_content_id: "FV:2/24"
    - slot: 5
      template: IconKey.dui
      config:
        icon: "mdi:television"
        label: "TV"
        action: select_source
        domain: media_player
        entity: living_room
        action_data:
          source: "TV"
    - slot: 6
      template: IconKey.dui
      config:
        icon: "mdi:coach-lamp"
        label: "Vitrine"
        action: toggle
        domain: switch
        entity: vitrine
    - slot: 7
      template: IconKey.dui
      config:
        icon: "mdi:desk-lamp"
        label: "TV Table"
        action: toggle
        domain: light
        entity: tv_table

  touchscreen:
    - slot: 0
      template: AudioCard.dui
      controller: audio
      config:
        media_player: living_room
    - slot: 1
      template: SoundCard.dui
      controller: eq
      config:
        bass_entity: living_room_bass
        treble_entity: living_room_treble
    - slot: 2
      template: LightCard.dui
      controller: light
      config:
        entity: living_room
    - slot: 3
      template: DashboardCard.dui
      controller: dashboard
      config:
        screens:
          - main
