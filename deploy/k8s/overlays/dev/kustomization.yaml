apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Dev overlay: Docker Desktop single-node, no smarter-device-manager
patches:
  - target:
      kind: Deployment
      name: sdeck
    patch: |
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits/smarter-devices~1usb-hidraw0
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          privileged: true
