apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Prod overlay: Talos K8s with smarter-device-manager
patches:
  - target:
      kind: Deployment
      name: sdeck
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          sdeck.io/usb-device: "true"
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/raven2eyes/sdeck:v0.1.0
