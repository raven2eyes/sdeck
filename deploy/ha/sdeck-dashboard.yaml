title: SDeck Control
views:
  # ── Scenes Overview ─────────────────────────────────────
  - title: Scenes
    path: scenes
    icon: mdi:view-carousel
    badges: []
    cards:
      - type: markdown
        content: |
          ## Stream Deck Scene Manager
          **Device:** Stream Deck + (WA5081LKVEE)

          Each button navigates to the scene detail view with live controls.

      - type: grid
        title: ""
        columns: 5
        square: false
        cards:
          - type: button
            name: Bedroom 2
            icon: mdi:bed-outline
            icon_height: 48px
            tap_action:
              action: navigate
              navigation_path: /s-deck/bedroom-two
          - type: button
            name: Living Room
            icon: mdi:sofa
            icon_height: 48px
            tap_action:
              action: navigate
              navigation_path: /s-deck/living-room
          - type: button
            name: Music
            icon: mdi:music
            icon_height: 48px
            tap_action:
              action: navigate
              navigation_path: /s-deck/music
          - type: button
            name: Kitchen
            icon: mdi:stove
            icon_height: 48px
            tap_action:
              action: navigate
              navigation_path: /s-deck/kitchen
          - type: button
            name: Bedroom 1
            icon: mdi:bed
            icon_height: 48px
            tap_action:
              action: navigate
              navigation_path: /s-deck/bedroom-one

  # ── Scene: Bedroom Two ─────────────────────────────────
  - title: Bedroom Two
    path: bedroom-two
    icon: mdi:bed-outline
    badges: []
    cards:
      # -- Touchscreen mirrors: Audio, Light, Timer --
      - type: media-control
        entity: media_player.bedroom_two

      - type: horizontal-stack
        cards:
          - type: light
            entity: light.bedroom_two_ceiling
            name: Ceiling
          - type: light
            entity: light.bedroom_two
            name: All Lights

      - type: horizontal-stack
        cards:
          - type: entity
            entity: timer.sdeck_bedroom_two
            name: Timer
          - type: markdown
            content: |
              # {{ now().strftime('%H:%M') }}
              {{ now().strftime('%A, %d %B') }}

      # -- Keys 0-7 --
      - type: grid
        title: "Stream Deck Keys"
        columns: 4
        square: false
        cards:
          - type: button
            name: "Bedroom 2"
            icon: mdi:bed-outline
            icon_height: 36px
            tap_action:
              action: navigate
              navigation_path: /s-deck/scenes
          - type: button
            name: "Lyskaede"
            icon: mdi:string-lights
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: switch.toggle
              target:
                entity_id: switch.lyskaede
          - type: button
            name: "Ceiling"
            icon: mdi:ceiling-light
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: light.toggle
              target:
                entity_id: light.bedroom_two_ceiling
          - type: button
            name: "Sleep"
            icon: mdi:power-sleep
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: light.turn_off
              target:
                entity_id: light.bedroom_two
          - type: button
            name: "John Mayer"
            icon: mdi:music
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: media_player.play_media
              target:
                entity_id: media_player.bedroom_two
              data:
                media_content_type: favorite_item_id
                media_content_id: "FV:2/38"
          - type: button
            name: "Beyoncé"
            icon: mdi:music
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: media_player.play_media
              target:
                entity_id: media_player.bedroom_two
              data:
                media_content_type: favorite_item_id
                media_content_id: "SQ:0"
          - type: button
            name: "Blues"
            icon: mdi:music
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: media_player.play_media
              target:
                entity_id: media_player.bedroom_two
              data:
                media_content_type: favorite_item_id
                media_content_id: "FV:2/36"
          - type: button
            name: "KVF Radio"
            icon: mdi:radio
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: media_player.play_media
              target:
                entity_id: media_player.bedroom_two
              data:
                media_content_type: favorite_item_id
                media_content_id: "FV:2/24"

